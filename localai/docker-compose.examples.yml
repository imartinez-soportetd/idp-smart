# ============================================
# LocalAI Docker Compose Override Examples
#
# Selecciona el escenario que corresponde a tu hardware
# y renómbralo a docker-compose.override.yml
#
# version: '3.8'
# ============================================

# ============================================
# ESCENARIO 1: GPU NVIDIA CUDA (Recomendado)
# Para: RTX 3060+, RTX 4080+, RTX 4090, etc.
# ============================================

# version: '3.8'
# services:
#   localai:
#     image: localai/localai:latest-aio-cuda-12
#     container_name: idp_localai
#     ports:
#       - "8080:8080"
#     environment:
#       - DEBUG=1
#       - THREADS=6
#       - CONTEXT_SIZE=8192
#       - MODELS_PATH=/build/models
#       - PRELOAD_MODELS=[{"url":"localai-models:granite-2b-vision-q4cm.gguf","name":"granite-vision"}]
#       # GPU Configuration
#       - CUDA_VISIBLE_DEVICES=0    # GPU ID (0, 1, 2, etc.)
#       - GPU_LAYERS=50             # Layers en GPU (aumentar según VRAM)
#       - MAIN_GPU=0
#     volumes:
#       - ./localai/models:/build/models
#       - ./localai/config:/etc/localai/config
#       - localai_cache:/root/.cache
#     restart: always
#     # NVIDIA GPU Runtime
#     deploy:
#       resources:
#         reservations:
#           devices:
#             - driver: nvidia
#               count: 1
#               capabilities: [gpu]
#     extra_hosts:
#       - "host.docker.internal:host-gateway"

