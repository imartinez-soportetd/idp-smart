# ============================================
# COMPARACIÓN RÁPIDA
# ============================================
# 
# | Escenario     | Tokens/sec | Latencia 1er | RAM   | Costo |
# |---------------|-----------|------------|-------|-------|
# | CPU AVX-2     | 15-20     | 800ms      | 6GB   | Budget|
# | OpenVINO      | 25-35     | 400ms      | 5GB   | Bajo  |
# | GPU RTX 3090  | 60-80     | 150ms      | 8GB   | Medio |
# | GPU RTX 4090  | 100+      | 100ms      | 12GB  | Alto  |
# | Multi-GPU     | 150+      | 80ms       | 24GB+ | Prod  |
#
# ============================================

